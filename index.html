<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action 'none'">
<title>柴犬撲克 v1.2.1</title>
<style>
/* ==========================================================================
   區段：全域樣式（v1.1.0 暖色像素風）
   ========================================================================== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --panel:#3b2718; --panel2:#4a3220; --pborder:#8a6642; --pdark:#2a1a0e;
  --cream:#e8d5b5; --dim:#b89a72;
  --gold:#e8b845; --blue:#3a6ea5; --bluehi:#8fd0ff; --red:#ff7a5c;
  --cardbg:#f3ead2; --cardink:#4a3220;
  --mono:Consolas,'Courier New',monospace;
}
html,body{height:100%}
body{
  background:#241508;
  font-family:'Segoe UI','Microsoft JhengHei','PingFang TC',Arial,sans-serif;
  color:var(--cream); overflow:hidden; user-select:none;
}
#scaler{position:absolute;top:0;left:0;transform-origin:top left;width:960px;height:600px}
#app{width:960px;height:600px;display:flex;gap:10px;padding:10px}

/* 左側欄（深棕面板） */
#side{width:250px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.panel{background:var(--panel);border:2px solid var(--pborder);border-radius:4px;padding:10px}
#blindCard{text-align:center}
#blindCard .btag{display:inline-block;font-size:12px;font-weight:700;color:#3b2718;background:var(--gold);border:2px solid #9a7420;border-radius:3px;padding:1px 10px;margin-bottom:6px}
#blindCard .bname{font-size:18px;font-weight:800;letter-spacing:1px;color:var(--cream)}
#blindCard .bdesc{font-size:11px;color:var(--dim);margin-top:3px;min-height:14px;line-height:1.3}
#blindCard .breq{margin-top:6px;font-size:12px;color:var(--dim)}
#blindCard .breq b{color:var(--red);font-size:20px;font-family:var(--mono)}
#roundScoreP{text-align:center}
#roundScoreP .lbl{font-size:12px;color:var(--dim)}
#roundScore{font-size:32px;font-weight:900;color:var(--gold);line-height:1.1;font-family:var(--mono)}
#preview{display:flex;flex-direction:column;align-items:center;gap:4px}
#pvHand{font-size:16px;font-weight:800;min-height:22px}
#pvNums{display:flex;align-items:center;gap:8px;font-size:24px;font-weight:900;font-family:var(--mono)}
#pvChips{color:#fff;background:var(--blue);border:2px solid #1e3f66;border-radius:3px;padding:0 8px}
#pvMult{color:#fff;background:#c0452f;border:2px solid #7a2418;border-radius:3px;padding:0 8px}
#pvX{color:var(--dim);font-size:18px}
.statRow{display:flex;gap:8px}
.stat{flex:1;background:var(--panel2);border:2px solid var(--pborder);border-radius:3px;padding:6px;text-align:center}
.stat .n{font-size:20px;font-weight:800;font-family:var(--mono)}
.stat.blue .n{color:#9cc7ff} .stat.red .n{color:var(--red)}
.stat .k{font-size:10px;color:var(--dim)}
#moneyP{display:flex;justify-content:space-between;align-items:center}
#money{font-size:22px;font-weight:900;color:var(--gold);font-family:var(--mono)}
#anteInfo{font-size:12px;color:var(--dim);text-align:right;line-height:1.4}

/* 右側主區：木紋桌面 */
#main{flex:1;background:repeating-linear-gradient(90deg,#5a3d26 0px,#5a3d26 22px,#523620 22px,#523620 24px,#5f412a 24px,#5f412a 46px,#4e331d 46px,#4e331d 48px);border:3px solid var(--pdark);border-radius:6px;position:relative;display:flex;flex-direction:column;padding:10px;box-shadow:inset 0 0 40px rgba(0,0,0,.35)}
#topRow{display:flex;gap:6px;height:96px;margin-bottom:6px}
.slotWrap{display:flex;flex-direction:column}
.slotWrap .cap{font-size:9px;color:rgba(232,213,181,.6);text-align:center;margin-bottom:2px}
.slots{display:flex;gap:5px}
.jslot,.cslot{width:62px;height:82px;border:2px dashed rgba(232,213,181,.35);border-radius:4px;display:flex;align-items:center;justify-content:center;position:relative}
.jslot.filled{border-style:solid;border-color:var(--gold);cursor:pointer;background:var(--panel)}
.jchip{position:absolute;bottom:2px;left:2px;right:2px;font-size:8px;text-align:center;background:rgba(42,26,14,.8);border-radius:2px;padding:1px;line-height:1.1;color:var(--cream)}
.rare-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:0;background:#9cc7ff}

#playArea{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:120px}
#playArea .placeholder{color:rgba(232,213,181,.4);font-size:13px}
.pcard{position:absolute}

#handRow{height:150px;display:flex;align-items:flex-end;justify-content:center;position:relative;margin-bottom:6px}
#btnRow{display:flex;gap:8px;justify-content:center;align-items:center;padding-bottom:2px}
.btn{border:3px solid;border-radius:4px;padding:8px 16px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:1px;color:#fff;font-family:inherit;box-shadow:0 3px 0 rgba(0,0,0,.45)}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.45)}
.btn.play{background:var(--blue);border-color:#1e3f66}
.btn.disc{background:#c0452f;border-color:#7a2418}
.btn.sort{background:var(--panel2);border-color:var(--pdark);color:var(--cream);font-size:12px;padding:8px 12px}
.btn.gold{background:var(--gold);border-color:#9a7420;color:#3b2718}
.btn:disabled{opacity:.4;cursor:not-allowed}
#deckBtn{position:absolute;right:10px;bottom:10px;background:var(--panel);border:2px solid var(--pborder);border-radius:4px;padding:4px 8px;font-size:11px;color:var(--cream);cursor:pointer;font-family:var(--mono)}

/* 撲克牌（像素風：奶油底＋深棕邊框＋內圈虛線＋中央大點數/花色） */
.card{width:72px;height:104px;border-radius:4px;background:var(--cardbg);box-shadow:0 3px 0 rgba(0,0,0,.4);position:absolute;cursor:pointer;transition:transform .18s ease, box-shadow .18s;overflow:hidden;border:2px solid var(--cardink);font-family:var(--mono)}
.card::after{content:'';position:absolute;inset:2px;border:1px dashed rgba(74,50,32,.45);border-radius:2px;pointer-events:none}
.card.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),0 5px 0 rgba(0,0,0,.45)}
.card .corner{position:absolute;top:2px;left:4px;font-weight:700;font-size:14px;line-height:1;z-index:2}
.card .corner .s{font-size:11px}
.card .bigrank{position:absolute;top:26px;left:0;right:0;text-align:center;font-size:32px;font-weight:900;line-height:1;z-index:1}
.card .bigsuit{position:absolute;top:62px;left:0;right:0;text-align:center;font-size:26px;line-height:1;z-index:1}
.card.red-suit{color:#a32d2d} .card.black-suit{color:#2c3e50}
.pop{position:absolute;font-weight:900;font-size:16px;color:var(--bluehi);text-shadow:0 1px 2px #000;pointer-events:none;animation:popUp .8s ease forwards;font-family:var(--mono)}
@keyframes popUp{0%{opacity:0;transform:translateY(0) scale(.6)}25%{opacity:1;transform:translateY(-14px) scale(1.15)}100%{opacity:0;transform:translateY(-38px) scale(1)}}
@keyframes bounce{0%{transform:translateY(0)}40%{transform:translateY(-16px) scale(1.08)}100%{transform:translateY(0)}}
.bouncing{animation:bounce .32s ease}

/* 覆蓋層 */
.overlay{display:none;position:absolute;inset:0;background:rgba(26,14,6,.85);z-index:50;align-items:center;justify-content:center;padding:14px}
.overlay.show{display:flex}
.oBox{background:var(--panel);border:2px solid var(--gold);border-radius:8px;padding:20px;max-width:820px;width:100%;max-height:560px;overflow:auto}
.oTitle{font-size:24px;font-weight:900;text-align:center;color:var(--gold);margin-bottom:12px}
.shelf{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.shopItem{background:var(--panel2);border:2px solid var(--pborder);border-radius:6px;padding:10px;width:150px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.shopItem .nm{font-size:14px;font-weight:800;color:var(--cream)}
.shopItem .ds{font-size:10px;color:var(--dim);min-height:26px;line-height:1.3}
.shopItem .pr{font-size:13px;font-weight:800;color:var(--gold);font-family:var(--mono)}
.miniBtn{border:2px solid #9a7420;border-radius:4px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;background:var(--gold);color:#3b2718;box-shadow:0 2px 0 rgba(0,0,0,.4)}
.miniBtn:active{transform:translateY(1px);box-shadow:0 1px 0 rgba(0,0,0,.4)}
.miniBtn:disabled{opacity:.4;cursor:not-allowed}
.miniBtn.grey{background:var(--panel);color:var(--cream);border:2px solid var(--pborder)}
.blindPick{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.blindCol{width:170px;background:var(--panel2);border:2px solid var(--pborder);border-radius:6px;padding:14px;text-align:center;display:flex;flex-direction:column;gap:8px}
.blindCol.cur{border-color:var(--gold);box-shadow:0 0 12px rgba(232,184,69,.4)}
.blindCol.done{opacity:.4}
.blindCol .bt{font-size:15px;font-weight:800;color:var(--cream)}
.blindCol .rq{font-size:22px;font-weight:900;color:var(--red);font-family:var(--mono)}
.blindCol .rw{font-size:12px;color:var(--gold)}
.blindCol .ef{font-size:11px;color:var(--dim);min-height:28px;line-height:1.3}
.cashLine{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;border-bottom:1px dashed var(--pborder)}
.cashLine b{color:var(--gold);font-family:var(--mono)}
#deckList{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.dcell{width:34px;height:48px;border-radius:3px;background:var(--cardbg);border:1px solid var(--cardink);font-size:11px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--mono)}
.dcell.used{opacity:.28}
.tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;background:var(--pdark);color:var(--dim)}
.tag.rare{background:#274b66;color:#9cc7ff}
#gameTitle{position:absolute;top:8px;left:14px;font-size:13px;font-weight:800;color:rgba(232,213,181,.55);letter-spacing:1px;z-index:2}
#toast{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(26,14,6,.9);color:var(--cream);padding:6px 14px;border-radius:4px;border:1px solid var(--pborder);font-size:13px;opacity:0;transition:opacity .3s;z-index:60;pointer-events:none}
#toast.show{opacity:1}
.jart{background-image:var(--jsprite);background-repeat:no-repeat;image-rendering:pixelated;margin:0 auto}
.blindCol .bstatus{font-size:11px;font-weight:700;color:var(--gold)}
</style>
</head>
<body>
<div id="scaler">
<div id="app">
  <!-- 左側欄 -->
  <div id="side">
    <div class="panel" id="blindCard">
      <span class="btag" id="blindTag">小盲</span>
      <div class="bname" id="blindName">—</div>
      <div class="bdesc" id="blindDesc"></div>
      <div class="breq">需求分數 <b id="blindReq">0</b></div>
    </div>
    <div class="panel" id="roundScoreP">
      <div class="lbl">回合分數</div>
      <div id="roundScore">0</div>
    </div>
    <div class="panel" id="preview">
      <div id="pvHand">選牌以預覽</div>
      <div id="pvNums"><span id="pvChips">0</span><span id="pvX">×</span><span id="pvMult">0</span></div>
    </div>
    <div class="panel">
      <div class="statRow">
        <div class="stat blue"><div class="n" id="playsLeft">4</div><div class="k">出牌</div></div>
        <div class="stat red"><div class="n" id="discLeft">3</div><div class="k">棄牌</div></div>
      </div>
    </div>
    <div class="panel" id="moneyP">
      <span style="font-size:12px;color:var(--dim)">金錢</span>
      <span id="money">$4</span>
    </div>
    <div class="panel">
      <div id="anteInfo">底注 1/8<br>回合 1</div>
    </div>
  </div>

  <!-- 右側主區 -->
  <div id="main">
    <div id="gameTitle">柴犬撲克 v1.2.1</div>
    <div id="topRow">
      <div class="slotWrap">
        <div class="cap">柴犬牌</div>
        <div class="slots" id="jokerSlots"></div>
      </div>
      <div class="slotWrap">
        <div class="cap">消耗牌</div>
        <div class="slots" id="consumeSlots"></div>
      </div>
    </div>
    <div id="playArea"><div class="placeholder">出牌區</div></div>
    <div id="handRow"></div>
    <div id="btnRow">
      <button class="btn play" id="btnPlay">出牌</button>
      <button class="btn sort" id="btnSortRank">點數</button>
      <button class="btn sort" id="btnSortSuit">花色</button>
      <button class="btn disc" id="btnDisc">棄牌</button>
    </div>
    <button id="deckBtn">牌庫 52</button>
  </div>
</div>
</div>

<!-- 覆蓋層 -->
<div class="overlay" id="overlay"><div class="oBox" id="oBox"></div></div>
<div id="toast"></div>

<script>

   v1.2.0：牌面簡化（大點數+花色）、小丑改用柴犬 sprite、盲注狀態標籤。
   v1.2.1：加入 meta CSP（封鎖外連/外部資源，安全強化）。

// 小丑 sprite 網格：4 欄 × 4 列，每格 72×128px（總圖 288×512）
// index = 小丑在 SHIBA_JOKERS 陣列中的順序 0..15
// 格位 = (index%4)*72, floor(index/4)*128
function jokerArt(idx,scale){
  const w=Math.round(72*scale), h=Math.round(128*scale);
  return `<div class="jart" style="width:${w}px;height:${h}px;background-position:${-(idx%4)*w}px ${-Math.floor(idx/4)*h}px;background-size:${w*4}px ${h*4}px"></div>`;
}

/* ==========================================================================
   區段 2：計分引擎
   ========================================================================== */
function detectStraight(ranks){
  const uniq = Array.from(new Set(ranks)).sort((a,b)=>a-b);
  if(uniq.length!==5) return {straight:false};
  if(uniq[4]-uniq[0]===4) return {straight:true,high:uniq[4]};
  if(uniq[0]===2&&uniq[1]===3&&uniq[2]===4&&uniq[3]===5&&uniq[4]===14)
    return {straight:true,high:5,lowAce:true};
  return {straight:false};
}

function evaluateHand(cards){
  const n=cards.length;
  const ranks=cards.map(c=>c.rank);
  const suits=cards.map(c=>c.suit);
  const rankCount={};
  for(const r of ranks) rankCount[r]=(rankCount[r]||0)+1;
  const counts=Object.values(rankCount).sort((a,b)=>b-a);
  const isFlush=n===5&&suits.every(s=>s===suits[0]);
  const isStraight=n===5&&detectStraight(ranks).straight;
  function cardsOfRank(rk){ return cards.filter(c=>c.rank===rk); }
  function rankWithCount(cnt){ return Object.keys(rankCount).filter(r=>rankCount[r]===cnt).map(Number).sort((a,b)=>b-a); }
  let key,scoring;
  if(isStraight&&isFlush){ key='STRAIGHT_FLUSH'; scoring=cards.slice(); }
  else if(counts[0]===4){ key='FOUR_KIND'; scoring=cardsOfRank(rankWithCount(4)[0]); }
  else if(counts[0]===3&&counts[1]===2){ key='FULL_HOUSE'; scoring=cards.slice(); }
  else if(isFlush){ key='FLUSH'; scoring=cards.slice(); }
  else if(isStraight){ key='STRAIGHT'; scoring=cards.slice(); }
  else if(counts[0]===3){ key='THREE_KIND'; scoring=cardsOfRank(rankWithCount(3)[0]); }
  else if(counts[0]===2&&counts[1]===2){ const rs=rankWithCount(2); scoring=cardsOfRank(rs[0]).concat(cardsOfRank(rs[1])); key='TWO_PAIR'; }
  else if(counts[0]===2){ key='PAIR'; scoring=cardsOfRank(rankWithCount(2)[0]); }
  else{ key='HIGH_CARD'; const mx=Math.max.apply(null,ranks); scoring=[cardsOfRank(mx)[0]]; }
  const t=HAND_TYPES[key];
  return {key,name:t.name,chips:t.chips,mult:t.mult,scoringCards:scoring};
}

function isCardDisabledByBoss(card,bossId){
  if(!bossId) return false;
  if(bossId==='no_heart'&&card.suit==='heart') return true;
  if(bossId==='no_club'&&card.suit==='club') return true;
  if(bossId==='no_face'&&card.rank>=11&&card.rank<=13) return true;
  return false;
}

function scorePlay(cards,jokers,bossId){
  const hand=evaluateHand(cards);
  const t=HAND_TYPES[hand.key];
  let chips=t.chips, mult=t.mult;
  const steps=[];
  for(const c of hand.scoringCards){
    if(isCardDisabledByBoss(c,bossId)){ steps.push({card:c,chips:0,disabled:true}); continue; }
    const cc=cardChips(c.rank); chips+=cc; steps.push({card:c,chips:cc});
  }
  const xMults=[];
  for(const j of (jokers||[])){
    switch(j.type){
      case 'flatMult': mult+=j.value; break;
      case 'flatChips': chips+=j.value; break;
      case 'suitMult': for(const c of hand.scoringCards){ if(c.suit===j.suit&&!isCardDisabledByBoss(c,bossId)) mult+=j.value; } break;
      case 'suitChips': for(const c of hand.scoringCards){ if(c.suit===j.suit&&!isCardDisabledByBoss(c,bossId)) chips+=j.value; } break;
      case 'handMult': if(j.hand===hand.key) mult+=j.value; break;
      case 'handChips': if(j.hand===hand.key) chips+=j.value; break;
      case 'growth': mult+=(j.growth||0); break;
      case 'xMult': xMults.push(j.value); break;
    }
  }
  let finalMult=mult;
  for(const x of xMults) finalMult*=x;
  return {handKey:hand.key,handName:hand.name,baseChips:t.chips,baseMult:t.mult,
    chips,mult:finalMult,score:Math.floor(chips*finalMult),
    scoreSteps:steps,scoringCards:hand.scoringCards,xMultApplied:xMults.length>0};
}

function blindRequirement(ante,blindType){
  return Math.round(ANTE_BASE[ante-1]*BLIND_META[blindType].mult);
}

/* ==========================================================================
   區段 4：遊戲狀態（集中於單一 state 物件）
   ========================================================================== */
const HAND_SIZE = 8;
let state = null;

function initState(){
  return {
    phase:'blindSelect',        // blindSelect | play | shop | gameover | win
    ante:1,
    blindIndex:0,               // 0=small 1=big 2=boss
    money:4,
    deck:[], hand:[], selected:[], playedCards:[],
    extraCards:[],              // 標準卡包購入的額外撲克牌（{suit,rank}），跨盲注保留
    playsLeft:4, discLeft:3,
    roundScore:0, requirement:0,
    jokers:[],                  // 玩家持有柴犬牌
    bossId:null, currentBlindType:'small',
    usedBossThisAnte:[],
    blindStatus:['pending','pending','pending'], // 本底注三關狀態：pending|beaten|skipped

    // 統計
    bestHand:0, totalPlays:0, farthestAnte:1,
    // 商店暫存
    shop:null,
    animating:false, skipAnim:false,
    rngBlindTypes:['small','big','boss'],
  };
}

function freshDeck(){
  const d=[]; let uid=0;
  for(const s of SUITS) for(const r of RANKS) d.push({uid:uid++,suit:s,rank:r,used:false});
  return d;
}
// 完整牌組 = 52 張基礎牌 + 標準卡包購入的額外牌（可成長至 53、54…）
function buildDeck(extraCards){
  const d=freshDeck();
  let uid=d.length;
  for(const e of (extraCards||[])) d.push({uid:uid++,suit:e.suit,rank:e.rank,used:false,extra:true});
  return d;
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* ==========================================================================
   區段 5：回合流程（純函式改 state 後再渲染）
   ========================================================================== */
function startBlind(blindType){
  const meta=BLIND_META[blindType];
  state.currentBlindType=blindType;
  state.requirement=blindRequirement(state.ante,blindType);
  state.roundScore=0;
  state.phase='play';
  state.deck=shuffle(buildDeck(state.extraCards));
  state.hand=[]; state.selected=[]; state.playedCards=[];
  // 修正 v1.0.1：清空出牌區 DOM，避免殘留上一回合打出的牌
  document.getElementById('playArea').innerHTML='<div class="placeholder">出牌區</div>';
  // Boss 設定
  state.bossId=null;
  if(blindType==='boss'){
    const avail=BOSS_EFFECTS.filter(b=>!state.usedBossThisAnte.includes(b.id));
    const boss=pick(avail.length?avail:BOSS_EFFECTS);
    state.bossId=boss.id;
    state.usedBossThisAnte.push(boss.id);
  }
  // 次數修正
  state.playsLeft = state.bossId==='one_hand' ? 1 : 4;
  state.discLeft  = state.bossId==='no_disc' ? 0 : 3;
  // 手牌上限修正
  state.curHandSize = HAND_SIZE - (state.bossId==='small_hand'?2:0);
  drawToFull();
  sortHand('rank');
  render();
}

function drawToFull(){
  const target=state.curHandSize||HAND_SIZE;
  while(state.hand.length<target){
    const c=state.deck.find(x=>!x.used && !state.hand.includes(x) && !state.playedCards.includes(x));
    if(!c) break;
    c.used=true;
    state.hand.push(c);
  }
}

function sortHand(mode){
  if(mode==='rank') state.hand.sort((a,b)=> b.rank-a.rank || SUIT_ORDER[a.suit]-SUIT_ORDER[b.suit]);
  else state.hand.sort((a,b)=> SUIT_ORDER[a.suit]-SUIT_ORDER[b.suit] || b.rank-a.rank);
}

function toggleSelect(uid){
  if(state.animating) return;
  const i=state.selected.indexOf(uid);
  if(i>=0) state.selected.splice(i,1);
  else{ if(state.selected.length>=5) return; state.selected.push(uid); }
  render();
}

function selectedCards(){ return state.selected.map(u=>state.hand.find(c=>c.uid===u)).filter(Boolean); }

function doPlay(){
  if(state.animating) return;
  const cards=selectedCards();
  if(cards.length===0){ toast('請先選牌'); return; }
  if(state.bossId==='exact_five' && cards.length!==5){ toast('本關必須恰好出 5 張'); return; }
  if(state.playsLeft<=0) return;
  state.playsLeft--; state.totalPlays++;
  const result=scorePlay(cards,state.jokers,state.bossId);
  // 從手牌移除已出牌
  state.playedCards=state.playedCards.concat(cards);
  state.hand=state.hand.filter(c=>!state.selected.includes(c.uid));
  state.selected=[];
  animateScore(cards,result);
}

function afterPlayResolved(result){
  state.roundScore+=result.score;
  if(result.score>state.bestHand) state.bestHand=result.score;
  // 氣球 Boss：隨機棄 2
  if(state.bossId==='rand_disc' && state.hand.length>0){
    for(let k=0;k<2 && state.hand.length>0;k++){
      const idx=Math.floor(Math.random()*state.hand.length);
      const c=state.hand.splice(idx,1)[0];
      state.playedCards.push(c);
    }
  }
  // 過關？
  if(state.roundScore>=state.requirement){ winBlind(); return; }
  // 出牌用完？
  if(state.playsLeft<=0){ loseGame(); return; }
  drawToFull(); sortHand('rank'); render();
}

function doDiscard(){
  if(state.animating) return;
  const cards=selectedCards();
  if(cards.length===0){ toast('請先選牌'); return; }
  if(state.discLeft<=0){ toast('沒有棄牌次數'); return; }
  state.discLeft--;
  state.playedCards=state.playedCards.concat(cards);
  state.hand=state.hand.filter(c=>!state.selected.includes(c.uid));
  state.selected=[];
  drawToFull(); sortHand('rank'); render();
}

function winBlind(){
  state.farthestAnte=Math.max(state.farthestAnte,state.ante);
  state.blindStatus[state.blindIndex]='beaten';
  enterShop();
}

function loseGame(){ state.phase='gameover'; render(); }

/* ==========================================================================
   區段 6：金錢結算 + 商店
   ========================================================================== */
function interestCap(){
  let cap=5;
  for(const j of state.jokers) if(j.econ==='interest') cap+=j.value;
  return cap;
}
function computeCashout(){
  const meta=BLIND_META[state.currentBlindType];
  const reward=meta.reward;
  const leftover=state.playsLeft; // 剩餘出牌 x$1
  const interest=Math.min(Math.floor(state.money/5),interestCap());
  let winbonus=0;
  for(const j of state.jokers) if(j.econ==='winbonus') winbonus+=j.value;
  return {reward,leftover,interest,winbonus,total:reward+leftover+interest+winbonus};
}

function enterShop(){
  const cash=computeCashout();
  state.money+=cash.total;
  // 成長柴：每過一關 +1 倍率
  for(const j of state.jokers) if(j.type==='growth') j.growth=(j.growth||0)+j.value;
  // 產生商店貨架
  state.shop=makeShop();
  state.pendingCash=cash;
  state.phase='shop';
  render();
}

function ownedIds(){ return state.jokers.map(j=>j.id); }
function randomJokerOffers(count){
  const pool=SHIBA_JOKERS.filter(j=>!ownedIds().includes(j.id));
  const bag=shuffle(pool);
  return bag.slice(0,count).map(j=>Object.assign({},j));
}
function makeShop(){
  return {
    jokers:randomJokerOffers(2),
    packs:[
      {id:'std',name:'標準卡包',price:4,type:'card',opened:false},
      {id:'shiba',name:'柴犬卡包',price:6,type:'joker',opened:false},
    ],
    rerollCost:5,
  };
}

function buyJoker(idx){
  const j=state.shop.jokers[idx];
  if(!j) return;
  if(state.jokers.length>=5){ toast('柴犬牌已滿（上限 5）'); return; }
  if(state.money<j.price){ toast('金錢不足'); return; }
  state.money-=j.price;
  const inst=Object.assign({},j);
  if(inst.type==='growth') inst.growth=0;
  state.jokers.push(inst);
  state.shop.jokers.splice(idx,1);
  render();
}

function reroll(){
  if(state.money<state.shop.rerollCost){ toast('金錢不足'); return; }
  state.money-=state.shop.rerollCost;
  state.shop.rerollCost+=1;
  state.shop.jokers=randomJokerOffers(2);
  render();
}

function openPack(idx){
  const p=state.shop.packs[idx];
  if(!p||p.opened) return;
  if(state.money<p.price){ toast('金錢不足'); return; }
  state.money-=p.price; p.opened=true;
  if(p.type==='card'){
    // 開 3 張撲克牌選 1，真正加入牌組（下一盲注洗入發牌池）
    const offers=[];
    for(let i=0;i<3;i++) offers.push({suit:pick(SUITS),rank:pick(RANKS)});
    showPackPick('標準卡包 — 選 1 張加入牌組',offers.map(o=>({
      label:`${rankLabel(o.rank)}${SUIT_SYMBOL[o.suit]}`, red:isRedSuit(o.suit),
      onPick:()=>{ state.extraCards.push({suit:o.suit,rank:o.rank}); toast('已加入牌組（下一關洗入牌庫）'); render(); }
    })));
  }else{
    const js=randomJokerOffers(2);
    if(js.length===0){ toast('沒有可用柴犬牌'); render(); return; }
    showPackPick('柴犬卡包 — 選 1 隻柴犬',js.map(j=>({
      shiba:j, onPick:()=>{
        if(state.jokers.length>=5){ toast('柴犬牌已滿'); render(); return; }
        const inst=Object.assign({},j); if(inst.type==='growth') inst.growth=0;
        state.jokers.push(inst); render();
      }
    })));
  }
}

function sellJoker(idx){
  const j=state.jokers[idx];
  if(!j) return;
  state.money+=Math.floor(j.price/2);
  state.jokers.splice(idx,1);
  render();
}

function nextRound(){
  // 前進盲注
  state.blindIndex++;
  if(state.blindIndex>2){
    state.blindIndex=0;
    state.ante++;
    state.usedBossThisAnte=[];
    state.blindStatus=['pending','pending','pending'];
    if(state.ante>8){ state.phase='win'; render(); return; }
  }
  state.phase='blindSelect';
  render();
}

function skipBlind(){
  // 小盲/大盲可跳過（無獎勵）
  state.blindStatus[state.blindIndex]='skipped';
  state.blindIndex++;
  if(state.blindIndex>2){ state.blindIndex=0; state.ante++; state.usedBossThisAnte=[]; state.blindStatus=['pending','pending','pending']; if(state.ante>8){ state.phase='win'; render(); return; } }
  state.phase='blindSelect';
  render();
}

function restart(){ state=initState(); render(); }

/* ==========================================================================
   區段 7：計分動畫
   ========================================================================== */
function animateScore(cards,result){
  state.animating=true; state.skipAnim=false;
  const playArea=document.getElementById('playArea');
  playArea.innerHTML='';
  const total=cards.length;
  const startX=(playArea.clientWidth-total*80)/2;
  const els=[];
  cards.forEach((c,i)=>{
    const el=cardEl(c,false);
    el.style.position='absolute';
    el.style.left=(startX+i*80)+'px';
    el.style.top='10px';
    el.classList.remove('sel');
    playArea.appendChild(el);
    els.push({el,card:c});
  });
  // 更新左側預覽為即將結算的牌型
  setPreview(result.handName,result.chips,result.mult);

  const scoreCardUids=result.scoringCards.map(c=>c.uid);
  let running=0;
  const finish=()=>{
    document.getElementById('roundScore').textContent=Math.min(state.roundScore+result.score,state.roundScore+result.score);
    setTimeout(()=>{ state.animating=false; afterPlayResolved(result); },260);
  };
  // 略過：點擊 playArea 直接結算
  const skip=()=>{ state.skipAnim=true; };
  playArea.onclick=skip;

  let idx=0;
  const stepDelay=Math.min(300, 1600/Math.max(1,result.scoreSteps.length));
  function stepNext(){
    if(state.skipAnim){
      // 直接把所有計分牌加總、跳過動畫
      finishImmediate(); return;
    }
    if(idx>=result.scoreSteps.length){ finish(); return; }
    const st=result.scoreSteps[idx];
    const found=els.find(e=>e.card.uid===st.card.uid);
    if(found && !st.disabled){
      found.el.classList.add('bouncing');
      const pop=document.createElement('div');
      pop.className='pop';
      pop.textContent='+'+st.chips;
      pop.style.left=found.el.style.left;
      pop.style.top='4px';
      playArea.appendChild(pop);
      setTimeout(()=>{ found.el.classList.remove('bouncing'); },320);
    }
    idx++;
    setTimeout(stepNext,stepDelay);
  }
  function finishImmediate(){ finish(); }
  setTimeout(stepNext,150);
}

/* ==========================================================================
   區段 8：UI 渲染
   ========================================================================== */
function cardEl(c,selectable){
  const el=document.createElement('div');
  el.className='card '+(isRedSuit(c.suit)?'red-suit':'black-suit');
  el.dataset.uid=c.uid;
  el.innerHTML=`<div class="corner">${rankLabel(c.rank)}<div class="s">${SUIT_SYMBOL[c.suit]}</div></div>`+
               `<div class="bigrank">${rankLabel(c.rank)}</div>`+
               `<div class="bigsuit">${SUIT_SYMBOL[c.suit]}</div>`;
  return el;
}

function setPreview(name,chips,mult){
  document.getElementById('pvHand').textContent=name||'—';
  document.getElementById('pvChips').textContent=chips;
  document.getElementById('pvMult').textContent=(Math.round(mult*100)/100);
}

function renderHand(){
  const row=document.getElementById('handRow');
  row.innerHTML='';
  const n=state.hand.length;
  const cardW=72, gap=Math.min(10, Math.max(-8,(row.clientWidth-40-n*cardW)/Math.max(1,n-1)));
  const totalW=n*cardW+(n-1)*gap;
  let x=(row.clientWidth-totalW)/2;
  state.hand.forEach((c)=>{
    const el=cardEl(c,true);
    const sel=state.selected.includes(c.uid);
    if(sel) el.classList.add('sel');
    el.style.left=x+'px';
    el.style.bottom=sel?'18px':'0px';
    el.onclick=()=>toggleSelect(c.uid);
    row.appendChild(el);
    x+=cardW+gap;
  });
}

function renderJokers(){
  const wrap=document.getElementById('jokerSlots');
  wrap.innerHTML='';
  for(let i=0;i<5;i++){
    const slot=document.createElement('div');
    slot.className='jslot';
    const j=state.jokers[i];
    if(j){
      slot.classList.add('filled');
      slot.innerHTML=jokerArt(j.art,0.625)+
        `<div class="jchip">${j.name}</div>`+
        (j.rarity==='rare'?'<div class="rare-dot"></div>':'');
      slot.onclick=()=>showJokerDetail(i);
    }
    wrap.appendChild(slot);
  }
  const cwrap=document.getElementById('consumeSlots');
  cwrap.innerHTML='';
  for(let i=0;i<2;i++){ const s=document.createElement('div'); s.className='cslot'; cwrap.appendChild(s); }
}

function renderSide(){
  const meta=BLIND_META[state.currentBlindType];
  document.getElementById('blindTag').textContent=meta.tag;
  if(state.bossId){
    const b=BOSS_EFFECTS.find(x=>x.id===state.bossId);
    document.getElementById('blindName').textContent=b.name;
    document.getElementById('blindDesc').textContent=b.desc;
  }else{
    document.getElementById('blindName').textContent=meta.tag;
    document.getElementById('blindDesc').textContent='';
  }
  document.getElementById('blindReq').textContent=state.requirement.toLocaleString();
  document.getElementById('roundScore').textContent=state.roundScore.toLocaleString();
  document.getElementById('playsLeft').textContent=state.playsLeft;
  document.getElementById('discLeft').textContent=state.discLeft;
  document.getElementById('money').textContent='$'+state.money;
  document.getElementById('anteInfo').innerHTML=`底注 ${state.ante}/8<br>${meta.tag}`;
  document.getElementById('deckBtn').textContent='牌庫 '+state.deck.filter(c=>!c.used).length;
}

function updatePreview(){
  const cards=selectedCards();
  if(cards.length===0){ document.getElementById('pvHand').textContent='選牌以預覽'; document.getElementById('pvChips').textContent='0'; document.getElementById('pvMult').textContent='0'; return; }
  const r=scorePlay(cards,state.jokers,state.bossId);
  setPreview(r.handName,r.chips,r.mult);
}

function render(){
  if(state.phase==='blindSelect'){ renderBlindSelect(); }
  else if(state.phase==='shop'){ renderShop(); }
  else if(state.phase==='gameover'){ renderEnd(false); }
  else if(state.phase==='win'){ renderEnd(true); }
  else { hideOverlay(); }
  renderSide();
  renderJokers();
  renderHand();
  updatePreview();
  // 按鈕狀態
  const canAct=state.phase==='play'&&!state.animating;
  document.getElementById('btnPlay').disabled=!canAct||state.playsLeft<=0;
  document.getElementById('btnDisc').disabled=!canAct||state.discLeft<=0;
  if(state.phase==='play' && document.getElementById('playArea').children.length===0){
    document.getElementById('playArea').innerHTML='<div class="placeholder">出牌區</div>';
  }
}

/* ---- 覆蓋層畫面 ---- */
function overlay(){ return document.getElementById('overlay'); }
function box(){ return document.getElementById('oBox'); }
function showOverlay(html){ box().innerHTML=html; overlay().classList.add('show'); }
function hideOverlay(){ overlay().classList.remove('show'); }

function renderBlindSelect(){
  const types=['small','big','boss'];
  let cols='';
  types.forEach((bt,i)=>{
    const meta=BLIND_META[bt];
    const req=blindRequirement(state.ante,bt);
    const cur=i===state.blindIndex;
    let ef='';
    if(bt==='boss') ef='Boss 效果隨機（開場揭曉）';
    // 狀態標籤：當前關 / 已擊敗 / 已跳過 / 下一關 / 之後
    let status;
    if(cur) status='▶ 當前關卡';
    else if(i<state.blindIndex) status=(state.blindStatus[i]==='skipped')?'已跳過':'✓ 已擊敗';
    else status=(i===state.blindIndex+1)?'下一關':'之後';
    cols+=`<div class="blindCol ${cur?'cur':'done'}">
      <div class="bstatus">${status}</div>
      <div class="bt">${meta.tag}</div>
      <div class="rq">${req.toLocaleString()}</div>
      <div class="rw">獎勵 $${meta.reward}</div>
      <div class="ef">${ef}</div>
      ${cur?`<button class="miniBtn" onclick="ui.selectBlind('${bt}')">選擇</button>`:''}
      ${cur&&bt!=='boss'?`<button class="miniBtn grey" onclick="ui.skip()">跳過</button>`:''}
    </div>`;
  });
  showOverlay(`<div class="oTitle">底注 ${state.ante} — 選擇盲注</div>
    <div class="blindPick">${cols}</div>
    <div style="text-align:center;color:var(--dim);font-size:12px;margin-top:12px">金錢 $${state.money}　柴犬牌 ${state.jokers.length}/5</div>`);
}

function renderShop(){
  const cash=state.pendingCash||{reward:0,leftover:0,interest:0,winbonus:0,total:0};
  let jhtml='';
  state.shop.jokers.forEach((j,i)=>{
    jhtml+=`<div class="shopItem">
      ${jokerArt(j.art,0.625)}
      <div class="nm">${j.name} <span class="tag ${j.rarity==='rare'?'rare':''}">${j.rarity==='rare'?'罕見':'普通'}</span></div>
      <div class="ds">${j.desc}</div>
      <div class="pr">$${j.price}</div>
      <button class="miniBtn" ${state.money<j.price||state.jokers.length>=5?'disabled':''} onclick="ui.buyJoker(${i})">購買</button>
    </div>`;
  });
  let phtml='';
  state.shop.packs.forEach((p,i)=>{
    phtml+=`<div class="shopItem">
      <div style="font-size:30px">${p.type==='card'?'🂠':'🐕'}</div>
      <div class="nm">${p.name}</div>
      <div class="ds">${p.type==='card'?'開 3 張撲克牌選 1':'開 2 隻柴犬選 1'}</div>
      <div class="pr">$${p.price}</div>
      <button class="miniBtn" ${p.opened||state.money<p.price?'disabled':''} onclick="ui.openPack(${i})">${p.opened?'已開':'開包'}</button>
    </div>`;
  });
  let owned='';
  state.jokers.forEach((j,i)=>{
    owned+=`<div class="shopItem" style="width:120px">
      ${jokerArt(j.art,0.5)}
      <div class="nm" style="font-size:12px">${j.name}</div>
      <button class="miniBtn grey" onclick="ui.sellJoker(${i})">賣 $${Math.floor(j.price/2)}</button>
    </div>`;
  });
  showOverlay(`
    <div class="oTitle">商店</div>
    <div style="max-width:360px;margin:0 auto 12px;background:var(--panel2);border:2px solid var(--pborder);border-radius:6px;padding:10px">
      <div class="cashLine"><span>盲注獎勵</span><b>$${cash.reward}</b></div>
      <div class="cashLine"><span>剩餘出牌 ×$1</span><b>$${cash.leftover}</b></div>
      <div class="cashLine"><span>利息</span><b>$${cash.interest}</b></div>
      ${cash.winbonus?`<div class="cashLine"><span>柴犬過關獎勵</span><b>$${cash.winbonus}</b></div>`:''}
      <div class="cashLine" style="border:none"><span>合計獲得</span><b>$${cash.total}</b></div>
      <div style="text-align:right;margin-top:4px">目前持有 <b style="color:var(--gold)">$${state.money}</b></div>
    </div>
    <div style="font-size:12px;color:var(--dim);margin:6px 0">柴犬牌貨架
      <button class="miniBtn grey" style="float:right" ${state.money<state.shop.rerollCost?'disabled':''} onclick="ui.reroll()">重擲 $${state.shop.rerollCost}</button>
    </div>
    <div class="shelf">${jhtml||'<div style="color:var(--dim)">已無可購買柴犬</div>'}</div>
    <div style="font-size:12px;color:var(--dim);margin:12px 0 6px">卡包</div>
    <div class="shelf">${phtml}</div>
    ${owned?`<div style="font-size:12px;color:var(--dim);margin:12px 0 6px">持有柴犬（可賣出）</div><div class="shelf">${owned}</div>`:''}
    <div style="text-align:center;margin-top:16px"><button class="btn gold" onclick="ui.nextRound()">下一回合 ▶</button></div>
  `);
}

function showJokerDetail(idx){
  const j=state.jokers[idx];
  const g=(j.type==='growth')?`（目前 +${j.growth||0} 倍率）`:'';
  showOverlay(`<div class="oTitle">${j.name}</div>
    <div style="text-align:center">${jokerArt(j.art,1)}
    <div style="margin-top:10px"><span class="tag ${j.rarity==='rare'?'rare':''}">${j.rarity==='rare'?'罕見':'普通'}</span></div>
    <p style="margin:12px 0;font-size:15px">${j.desc} ${g}</p>
    <button class="miniBtn grey" onclick="ui.sellJoker(${idx});ui.closeDetail()">賣出 $${Math.floor(j.price/2)}</button>
    <button class="btn sort" style="margin-left:10px" onclick="ui.closeDetail()">關閉</button></div>`);
}
function closeDetail(){ hideOverlay(); render(); }

function showPackPick(title,options){
  let html='';
  options.forEach((o,i)=>{
    if(o.shiba){
      html+=`<div class="shopItem">
        ${jokerArt(o.shiba.art,0.625)}
        <div class="nm">${o.shiba.name}</div><div class="ds">${o.shiba.desc}</div>
        <button class="miniBtn" onclick="ui.pickPack(${i})">選這隻</button></div>`;
    }else{
      html+=`<div class="shopItem">
        <div class="dcell" style="width:44px;height:60px;font-size:18px;color:${o.red?'#a32d2d':'#2c3e50'}">${o.label}</div>
        <button class="miniBtn" onclick="ui.pickPack(${i})">選這張</button></div>`;
    }
  });
  state._packOptions=options;
  showOverlay(`<div class="oTitle">${title}</div><div class="shelf">${html}</div>
    <div style="text-align:center;margin-top:14px"><button class="btn sort" onclick="ui.closePack()">略過</button></div>`);
}
function pickPack(i){ const o=state._packOptions[i]; if(o&&o.onPick) o.onPick(); state._packOptions=null; renderShop(); }
function closePack(){ state._packOptions=null; renderShop(); }

function showDeckList(){
  let cells='';
  state.deck.slice().sort((a,b)=>SUIT_ORDER[a.suit]-SUIT_ORDER[b.suit]||b.rank-a.rank).forEach(c=>{
    cells+=`<div class="dcell ${c.used?'used':''}" style="color:${isRedSuit(c.suit)?'#a32d2d':'#2c3e50'}">${rankLabel(c.rank)}<div>${SUIT_SYMBOL[c.suit]}</div></div>`;
  });
  const remain=state.deck.filter(c=>!c.used).length;
  showOverlay(`<div class="oTitle">牌組（剩餘 ${remain}/${state.deck.length}）</div><div id="deckList">${cells}</div>
    <div style="text-align:center;margin-top:14px"><button class="btn sort" onclick="ui.closeDeck()">關閉</button></div>`);
}
function closeDeck(){ hideOverlay(); render(); }

function renderEnd(won){
  showOverlay(`<div class="oTitle">${won?'🏆 通關！所有底注征服！':'💀 挑戰失敗'}</div>
    <div style="max-width:320px;margin:0 auto;font-size:15px;line-height:2">
      <div class="cashLine"><span>最高單手分數</span><b>${state.bestHand.toLocaleString()}</b></div>
      <div class="cashLine"><span>總出牌次數</span><b>${state.totalPlays}</b></div>
      <div class="cashLine"><span>最遠底注</span><b>${state.farthestAnte} / 8</b></div>
    </div>
    <div style="text-align:center;margin-top:20px"><button class="btn gold" onclick="ui.restart()">再來一局</button></div>`);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1400);
}

/* ==========================================================================
   區段 9：事件繫結 + 縮放 + 啟動
   ========================================================================== */
const ui = {
  selectBlind:(bt)=>startBlind(bt),
  skip:()=>skipBlind(),
  buyJoker:(i)=>buyJoker(i),
  reroll:()=>reroll(),
  openPack:(i)=>openPack(i),
  sellJoker:(i)=>sellJoker(i),
  nextRound:()=>nextRound(),
  restart:()=>restart(),
  pickPack:(i)=>pickPack(i),
  closePack:()=>closePack(),
  closeDetail:()=>closeDetail(),
  closeDeck:()=>closeDeck(),
};

function bind(){
  document.getElementById('btnPlay').onclick=doPlay;
  document.getElementById('btnDisc').onclick=doDiscard;
  document.getElementById('btnSortRank').onclick=()=>{ sortHand('rank'); render(); };
  document.getElementById('btnSortSuit').onclick=()=>{ sortHand('suit'); render(); };
  document.getElementById('deckBtn').onclick=showDeckList;
}

function fitScale(){
  const scaler=document.getElementById('scaler');
  const w=window.innerWidth, h=window.innerHeight;
  const scale=Math.min(w/960, h/600);
  scaler.style.transform=`scale(${scale})`;
  scaler.style.left=((w-960*scale)/2)+'px';
  scaler.style.top=((h-600*scale)/2)+'px';
}
window.addEventListener('resize',fitScale);
window.addEventListener('orientationchange',fitScale);

// 啟動
document.documentElement.style.setProperty('--jsprite','url("data:image/png;base64,'+JOKER_B64+'")');
state=initState();
bind();
fitScale();
render();
</script>
</body>
</html>
